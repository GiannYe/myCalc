<!DOCTYPE html>
<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Custom App">
    
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="corpo">
        <div id="navigazione">
            <button></button>
        </div>

        <div id="celle">
            <input id="input1" readonly data-currency="EUR">
            <input id="input2" readonly data-currency="USD">
            <input id="input3" readonly data-currency="RMB">
            <input id="input4" readonly data-currency="GBP">
            <input id="input5" readonly data-currency="CAD">
        </div>
                    
        <div id="tasti">
            <button data-value="back"><-</button>
            <button data-value="forw">-></button>
            <button data-value="AC">AC</button>
            <button data-value="canc">canc</button> 

            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="+">+</button> 

            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="-">-</button>
    
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="*">*</button>
    
            <button data-value=".">.</button>
            <button data-value="0">0</button>
            <button data-value="=">=</button>
            <button data-value="/">/</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
